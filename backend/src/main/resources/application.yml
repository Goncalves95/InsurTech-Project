spring:
  application:
    name: insurtech-claims-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/insurtech}
    username: ${DB_USERNAME:insurtech}
    password: ${DB_PASSWORD:insurtech}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    contexts: ${spring.profiles.active:dev}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: insurtech-platform
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ch.insurtech.platform.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/insurtech}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

azure:
  document-intelligence:
    endpoint: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:http://stub}
    key: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:stub-key}
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:stub}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME:claims}

sendgrid:
  api-key: ${SENDGRID_API_KEY:stub-key}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@insurtech.local}
  from-name: ${SENDGRID_FROM_NAME:InsurTech Platform}

insurtech:
  keycloak:
    admin:
      url: ${KEYCLOAK_URL:http://localhost:8180}
      realm: ${KEYCLOAK_REALM:insurtech}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:insurtech-backend}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}

logging:
  level:
    ch.insurtech.platform: INFO
    org.springframework.modulith: INFO
