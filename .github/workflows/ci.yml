name: InsurTech Platform CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  backend:
    name: Backend — Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build, unit tests & integration tests
        # TestContainers spins up real PostgreSQL + Kafka via the Docker daemon
        # that is pre-installed on every ubuntu-latest GitHub Actions runner.
        run: mvn verify -B --no-transfer-progress
        working-directory: backend

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-results
          path: backend/target/surefire-reports/
          retention-days: 14

      - name: Upload Failsafe results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-integration-test-results
          path: backend/target/failsafe-reports/
          retention-days: 14

  frontend:
    name: Frontend — Lint, Test & Build (Angular 21 / Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Unit tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

  ci-gate:
    name: CI — All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          backend="${{ needs.backend.result }}"
          frontend="${{ needs.frontend.result }}"
          if [[ "$backend" != "success" || "$frontend" != "success" ]]; then
            echo "backend=$backend  frontend=$frontend"
            exit 1
          fi
          echo "All CI checks passed."
