<mat-toolbar color="primary">
  <span class="brand" routerLink="/">InsurTech Platform</span>
  <span class="spacer"></span>

  @if (authService.authenticated()) {
    <span class="username">{{ authService.username() }}</span>

    @if (authService.isBackoffice()) {
      <button mat-button routerLink="/backoffice/dashboard">
        <mat-icon>admin_panel_settings</mat-icon>
        Backoffice
      </button>
    }

    @if (!authService.isBackoffice()) {
      <button mat-button routerLink="/portal/claims">
        <mat-icon>receipt_long</mat-icon>
        My Claims
      </button>
    }

    <button mat-icon-button (click)="authService.logout()" aria-label="Logout">
      <mat-icon>logout</mat-icon>
    </button>
  } @else {
    <button mat-raised-button (click)="authService.login()">Login</button>
  }
</mat-toolbar>

@if (authService.isBackoffice()) {
  <nav class="backoffice-nav">
    <a mat-button routerLink="/backoffice/dashboard" routerLinkActive="backoffice-nav__link--active">
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </a>
    <a mat-button routerLink="/backoffice/review-queue" routerLinkActive="backoffice-nav__link--active">
      <mat-icon>rate_review</mat-icon>
      Review Queue
    </a>
  </nav>
}

<div class="canvas" [class.canvas--portal]="!authService.isBackoffice()">
  <main class="content">
    <router-outlet />
  </main>
</div>
